name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://postgres:postgres@localhost:54322/postgres

jobs:
  check:
    name: Lint & Format
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check
        working-directory: backend
        run: cargo check --workspace --tests

      - name: Check Formatting
        working-directory: backend
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: backend
        run: cargo clippy --workspace --all-targets -- -D warnings

  contract:
    name: API Contract
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Regenerate OpenAPI and frontend schema
        run: |
          cd backend
          cargo test -p api --lib tests::export_openapi_json -- --nocapture
          cd ..
          node frontend/scripts/generate-schema.mjs

      - name: Check generated schema is committed
        run: git diff --exit-code -- backend/docs/openapi.json frontend/src/types/schema.ts

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:54322/postgres

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        working-directory: infrastructure
        run: supabase start

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features rustls,postgres

      - name: Run Migrations
        working-directory: backend
        run: sqlx migrate run

      - name: Run backend tests
        working-directory: backend
        run: cargo test --workspace

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test run

      - name: Build
        run: pnpm build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build unified Railway image
        run: docker build --pull --tag televent:ci .
